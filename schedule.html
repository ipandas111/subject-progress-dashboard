<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>排期 · 六科目课题进度看板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
<style>
  :root {
    --page-bg: #f7f6f2;
    --surface: #ffffff;
    --surface-muted: #f1efe8;
    --border: #e4e1d7;
    --border-strong: #cfccc0;
    --text-primary: #1f1e1b;
    --text-secondary: #6b695f;
    --text-muted: #9c9a8d;

    --green-fill: #639922;
    --green-bg: #eaf3de;
    --green-text: #27500a;

    --today-fill: #e24b4a;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--page-bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header .title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
  }

  .header .title i { font-size: 22px; color: var(--green-fill); }

  .back-link {
    display: inline-flex;
    align-items: center;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    gap: 4px;
    margin-right: 4px;
  }
  .back-link:hover { color: var(--text-primary); }

  .sync-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface-muted);
    padding: 5px 12px;
    border-radius: var(--radius);
  }

  .sync-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-fill);
    display: inline-block;
  }

  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 1.75rem 0 1rem;
  }

  .calendar-title { font-size: 20px; font-weight: 600; }

  .calendar-nav-btns { display: flex; align-items: center; gap: 8px; }

  .nav-btn {
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: var(--radius);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
  }
  .nav-btn:hover { background: var(--surface-muted); }

  .nav-btn-today { width: auto; padding: 0 14px; font-size: 13px; font-weight: 500; color: var(--text-primary); }

  .weekday-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    padding: 0 0 8px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .day-cell {
    background: var(--surface);
    min-height: 100px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .day-cell.out-of-month { background: var(--surface-muted); }
  .day-cell.out-of-month .day-number { color: var(--text-muted); }

  .day-number {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .day-number.today { background: var(--today-fill); color: #fff; }

  .day-events {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }

  .event-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 5px;
    background: var(--green-bg);
    color: var(--green-text);
  }
  .event-chip .event-text { cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-chip .event-remove { cursor: pointer; flex: 0 0 auto; opacity: 0.5; }
  .event-chip .event-remove:hover { opacity: 1; }

  .event-input {
    width: 100%;
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 5px;
    border: 1px solid var(--border-strong);
    font-family: inherit;
  }

  .add-event-btn {
    align-self: flex-start;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .add-event-btn:hover { color: var(--text-primary); }

  .empty-msg { color: var(--text-muted); font-size: 13px; padding: 1rem 0; }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  @media (max-width: 720px) {
    .day-cell { min-height: 76px; padding: 6px; }
    .event-chip { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="title">
      <a class="back-link" href="index.html" aria-label="返回看板"><i class="ti ti-arrow-left"></i></a>
      <i class="ti ti-calendar" aria-hidden="true"></i>排期
    </div>
    <div class="sync-pill"><span class="dot"></span><span id="sync-time">连接中…</span></div>
  </div>

  <div class="calendar-nav">
    <span class="calendar-title" id="calendar-title">–</span>
    <div class="calendar-nav-btns">
      <button id="prev-month" class="nav-btn" aria-label="上个月"><i class="ti ti-chevron-left"></i></button>
      <button id="today-btn" class="nav-btn nav-btn-today" type="button">今天</button>
      <button id="next-month" class="nav-btn" aria-label="下个月"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="weekday-row">
    <span>周日</span><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span>
  </div>

  <div class="calendar-grid" id="calendar-grid"></div>

  <footer>排期日历 · 点击日期格子里的"添加日程"即可新增，点日程文字可改名，点 × 可删除，改动会实时同步给所有人</footer>

</div>

<script type="module">
const SUPABASE_URL = 'https://zupdhiqydqjwmqegqczz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xn0bVmqERGws5Rr2o08bSA_tS7yrm1O';
let supabase = null;

let events = [];
const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function pad(n) { return String(n).padStart(2, '0'); }
function toDateStr(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }

function renderCalendar() {
  document.getElementById('calendar-title').textContent = `${viewYear}年${viewMonth + 1}月`;

  const startWeekday = new Date(viewYear, viewMonth, 1).getDay();
  const daysInThisMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
  const todayStr = toDateStr(now.getFullYear(), now.getMonth(), now.getDate());

  const cells = [];
  for (let i = 0; i < startWeekday; i++) {
    const d = daysInPrevMonth - startWeekday + 1 + i;
    let y = viewYear, m = viewMonth - 1;
    if (m < 0) { m = 11; y -= 1; }
    cells.push({ date: toDateStr(y, m, d), dayNum: d, outOfMonth: true });
  }
  for (let d = 1; d <= daysInThisMonth; d++) {
    cells.push({ date: toDateStr(viewYear, viewMonth, d), dayNum: d, outOfMonth: false });
  }
  let trailing = 1;
  while (cells.length % 7 !== 0) {
    let y = viewYear, m = viewMonth + 1;
    if (m > 11) { m = 0; y += 1; }
    cells.push({ date: toDateStr(y, m, trailing), dayNum: trailing, outOfMonth: true });
    trailing += 1;
  }

  const html = cells.map(cell => {
    const dayEvents = events.filter(e => e.event_date === cell.date);
    const eventsHtml = dayEvents.map(e => `
      <div class="event-chip" data-id="${e.id}">
        <span class="event-text">${escapeHtml(e.title)}</span>
        <span class="event-remove" title="删除"><i class="ti ti-x"></i></span>
      </div>
    `).join('');
    const isToday = cell.date === todayStr;
    return `
      <div class="day-cell ${cell.outOfMonth ? 'out-of-month' : ''}" data-date="${cell.date}">
        <span class="day-number ${isToday ? 'today' : ''}">${cell.dayNum}</span>
        <div class="day-events">${eventsHtml}</div>
        ${cell.outOfMonth ? '' : '<button class="add-event-btn" type="button"><i class="ti ti-plus"></i>添加日程</button>'}
      </div>
    `;
  }).join('');

  document.getElementById('calendar-grid').innerHTML = html;
  attachDayHandlers();
}

function showAddInput(cell, date) {
  const wrap = cell.querySelector('.day-events');
  const addBtn = cell.querySelector('.add-event-btn');
  if (addBtn) addBtn.style.display = 'none';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'event-input';
  input.placeholder = '日程标题，回车保存';
  wrap.appendChild(input);
  input.focus();

  let committed = false;
  const commit = async () => {
    if (committed) return;
    committed = true;
    const title = input.value.trim();
    if (!title) { renderCalendar(); return; }
    if (!supabase) { alert('正在连接，请稍后重试'); renderCalendar(); return; }
    const { data, error } = await supabase.from('events').insert({ event_date: date, title }).select().single();
    if (error) { alert('保存失败：' + error.message); renderCalendar(); return; }
    events.push(data);
    renderCalendar();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') { committed = true; renderCalendar(); }
  });
  input.addEventListener('blur', commit);
}

function showEditInput(chip, id, currentTitle) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'event-input';
  input.value = currentTitle;
  chip.replaceWith(input);
  input.focus();
  input.select();

  let committed = false;
  const commit = async () => {
    if (committed) return;
    committed = true;
    const title = input.value.trim();
    if (!title) { renderCalendar(); return; }
    if (!supabase) { alert('正在连接，请稍后重试'); renderCalendar(); return; }
    const { error } = await supabase.from('events').update({ title }).eq('id', id);
    if (error) { alert('保存失败：' + error.message); renderCalendar(); return; }
    const idx = events.findIndex(e => e.id === id);
    if (idx >= 0) events[idx] = { ...events[idx], title };
    renderCalendar();
  };
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') commit();
    if (e.key === 'Escape') { committed = true; renderCalendar(); }
  });
  input.addEventListener('blur', commit);
}

function attachDayHandlers() {
  document.querySelectorAll('.add-event-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cell = btn.closest('.day-cell');
      showAddInput(cell, cell.dataset.date);
    });
  });
  document.querySelectorAll('.event-chip .event-text').forEach(span => {
    span.addEventListener('click', () => {
      const chip = span.closest('.event-chip');
      showEditInput(chip, chip.dataset.id, span.textContent);
    });
  });
  document.querySelectorAll('.event-remove').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const chip = btn.closest('.event-chip');
      const id = chip.dataset.id;
      if (!confirm('删除这条日程？')) return;
      if (!supabase) { alert('正在连接，请稍后重试'); return; }
      const { error } = await supabase.from('events').delete().eq('id', id);
      if (error) { alert('删除失败：' + error.message); return; }
      events = events.filter(ev => ev.id !== id);
      renderCalendar();
    });
  });
}

function initNavButtons() {
  document.getElementById('prev-month').addEventListener('click', () => {
    viewMonth -= 1;
    if (viewMonth < 0) { viewMonth = 11; viewYear -= 1; }
    renderCalendar();
  });
  document.getElementById('next-month').addEventListener('click', () => {
    viewMonth += 1;
    if (viewMonth > 11) { viewMonth = 0; viewYear += 1; }
    renderCalendar();
  });
  document.getElementById('today-btn').addEventListener('click', () => {
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    renderCalendar();
  });
}

initNavButtons();
renderCalendar();

async function boot() {
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const { data, error } = await supabase.from('events').select('*');
  if (!error) events = data;
  renderCalendar();
  document.getElementById('sync-time').textContent = '实时同步';

  supabase
    .channel('events-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, payload => {
      const incoming = payload.new && Object.keys(payload.new).length ? payload.new : payload.old;
      const idx = events.findIndex(e => e.id === incoming.id);
      if (payload.eventType === 'DELETE') {
        if (idx >= 0) events.splice(idx, 1);
      } else if (idx >= 0) {
        events[idx] = payload.new;
      } else {
        events.push(payload.new);
      }
      renderCalendar();
    })
    .subscribe();
}

boot().catch(() => {
  document.getElementById('sync-time').textContent = '连接失败，请刷新重试';
});
</script>
</body>
</html>
