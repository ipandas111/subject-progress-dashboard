<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>六科目课题进度看板</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
<style>
  :root {
    --page-bg: #f7f6f2;
    --surface: #ffffff;
    --surface-muted: #f1efe8;
    --border: #e4e1d7;
    --border-strong: #cfccc0;
    --text-primary: #1f1e1b;
    --text-secondary: #6b695f;
    --text-muted: #9c9a8d;

    --gray-fill: #888780;
    --gray-pale: #cfccc0;
    --gray-bg: #f1efe8;
    --gray-text: #444441;
    --gray-border: #b4b2a9;

    --amber-fill: #ba7517;
    --amber-pale: #faeeda;
    --amber-bg: #faeeda;
    --amber-text: #633806;

    --green-fill: #639922;
    --green-pale: #eaf3de;
    --green-bg: #eaf3de;
    --green-text: #27500a;

    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;

    --track-empty: #e4e1d7;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--page-bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6;
  }

  .page {
    max-width: 920px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .header .title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: 600;
  }

  .header .title i { font-size: 24px; color: var(--green-fill); }

  .sync-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface-muted);
    padding: 5px 12px;
    border-radius: var(--radius);
  }

  .sync-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-fill);
    display: inline-block;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 1.25rem;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
    cursor: pointer;
  }
  .kpi-card:hover { border-color: var(--border-strong); }
  .kpi-card.active { background: var(--surface-muted); border-color: var(--border-strong); }

  .kpi-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.9rem 1.1rem;
    margin-bottom: 1.25rem;
  }

  .kpi-detail-title {
    font-size: 13px;
    color: var(--text-secondary);
    margin: 0 0 10px;
  }

  .kpi-detail-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .kpi-detail-chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: var(--radius);
    background: var(--surface-muted);
    color: var(--text-primary);
    white-space: nowrap;
  }

  .kpi-card p.label {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kpi-card p.value {
    font-size: 26px;
    font-weight: 600;
    margin: 0;
  }

  .dot-sm {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .legend-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 1.75rem;
    padding: 0 2px;
  }

  .legend-stages, .legend-status {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }

  .legend-arrow { color: var(--text-muted); font-size: 13px; }

  .status-swatch {
    width: 22px;
    height: 6px;
    border-radius: 3px;
    display: flex;
    overflow: hidden;
  }

  .cards {
    display: grid;
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.3rem;
  }

  .card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .card-head i { font-size: 19px; color: var(--green-fill); }

  .card-head .name { font-size: 16px; font-weight: 600; }
  .card-head .count { margin-left: auto; font-size: 12px; color: var(--text-muted); }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-top: 1px solid var(--border);
  }

  .row .group-name {
    flex: 0 0 160px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .single-body {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .track-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 5px;
    min-width: 100px;
  }

  .seg {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    background: var(--track-empty);
  }

  .seg span { flex: 1; }

  .arrow { font-size: 11px; color: var(--text-muted); flex: 0 0 auto; }

  .badge {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: var(--radius);
    white-space: nowrap;
  }

  .badge-gray { background: var(--gray-bg); color: var(--gray-text); border: 1px solid var(--gray-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }

  .branch-row .group-name {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--text-muted);
  }
  .branch-row .group-name i { font-size: 13px; }

  .legend-note {
    font-size: 12px;
    color: var(--text-muted);
    margin: -1.25rem 0 1.5rem;
    padding: 0 2px;
  }

  .edit-btn {
    flex: 0 0 auto;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
  }
  .edit-btn:hover { background: var(--surface-muted); }

  .edit-form {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .edit-form select {
    font-size: 13px;
    padding: 5px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-primary);
  }

  .edit-form button {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
  }

  .edit-form button.save-btn { background: var(--green-fill); color: #fff; border-color: var(--green-fill); }
  .save-btn:disabled { opacity: .6; cursor: default; }
  .cancel-btn:hover { background: var(--surface-muted); }

  .single-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .single-card .lead {
    font-size: 12px;
    color: var(--text-muted);
    margin: 0 0 10px;
  }

  .empty-msg {
    color: var(--text-muted);
    font-size: 13px;
    padding: 1rem 0;
  }

  footer {
    margin-top: 2.5rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  @media (max-width: 720px) {
    .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .single-grid { grid-template-columns: 1fr; }
    .row, .single-body { flex-wrap: wrap; }
    .row .group-name { flex: 1 1 100%; }
    .track-wrap { flex: 1 1 auto; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="title"><i class="ti ti-chart-bar"></i>六科目课题进度看板</div>
    <div class="sync-pill"><span class="dot"></span><span id="sync-time">连接中…</span></div>
  </div>

  <div class="kpi-grid">
    <div class="kpi-card" data-stage="all">
      <p class="label">课题组总数</p>
      <p class="value" id="kpi-total">–</p>
    </div>
    <div class="kpi-card" data-stage="1">
      <p class="label"><span class="dot-sm" style="background:var(--gray-fill);"></span>沟通预算</p>
      <p class="value" id="kpi-stage1">–</p>
    </div>
    <div class="kpi-card" data-stage="2">
      <p class="label"><span class="dot-sm" style="background:var(--amber-fill);"></span>建设目录</p>
      <p class="value" id="kpi-stage2">–</p>
    </div>
    <div class="kpi-card" data-stage="3">
      <p class="label"><span class="dot-sm" style="background:var(--green-fill);"></span>初设目录</p>
      <p class="value" id="kpi-stage3">–</p>
    </div>
  </div>

  <div id="kpi-detail" class="kpi-detail" style="display:none;"></div>

  <div class="legend-row">
    <div class="legend-stages">
      <span class="legend-item"><span class="dot-sm" style="background:var(--gray-fill);"></span>沟通预算</span>
      <span class="legend-arrow"><i class="ti ti-arrow-right"></i></span>
      <span class="legend-item"><span class="dot-sm" style="background:var(--amber-fill);"></span>建设目录</span>
      <span class="legend-arrow"><i class="ti ti-arrow-right"></i></span>
      <span class="legend-item"><span class="dot-sm" style="background:var(--green-fill);"></span>初设目录</span>
    </div>
    <div class="legend-status">
      <span class="legend-item"><span class="status-swatch"><span style="background:var(--green-fill);"></span></span>已完成</span>
      <span class="legend-item"><span class="status-swatch"><span style="background:var(--green-fill);"></span><span style="background:var(--green-pale);"></span></span>进行中</span>
    </div>
  </div>

  <p class="legend-note">进入初设目录阶段后，「建设成果梳理」作为并行模块与其同步推进，独立记录进度</p>

  <div class="cards" id="cards-container">
    <p class="empty-msg">正在加载课题组数据…</p>
  </div>

  <footer>六科目课题进度看板 · 点击各课题组右侧的编辑图标即可更新进度，改动会实时同步给所有人</footer>

</div>

<script type="module">
const SUPABASE_URL = 'https://zupdhiqydqjwmqegqczz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xn0bVmqERGws5Rr2o08bSA_tS7yrm1O';
let supabase = null;

const SUBJECT_ICON = {
  '化学': 'ti-flask',
  '地理': 'ti-world',
  '生物': 'ti-leaf',
  '数学': 'ti-math-function',
  '物理': 'ti-atom',
  '天文': 'ti-telescope'
};
const MULTI_SUBJECTS = ['化学', '地理', '生物'];
const SINGLE_SUBJECTS = ['数学', '物理', '天文'];
const STAGE_LABEL = { 1: '沟通预算', 2: '建设目录', 3: '初设目录' };

let groups = [];
let editingKey = null;
let selectedStage = null;

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function fillVar(stage) {
  return stage === 1 ? 'var(--gray-fill)' : stage === 2 ? 'var(--amber-fill)' : 'var(--green-fill)';
}
function paleVar(stage) {
  return stage === 1 ? 'var(--gray-pale)' : stage === 2 ? 'var(--amber-pale)' : 'var(--green-pale)';
}
function badgeClass(stage) {
  return stage === 1 ? 'badge-gray' : stage === 2 ? 'badge-amber' : 'badge-green';
}
function badgeText(stage, subStatus) {
  return STAGE_LABEL[stage] + (subStatus === 'done' ? '完成' : '中');
}

function trackHTML(stage, subStatus) {
  const parts = [1, 2, 3].map(i => {
    let left = 'transparent';
    let right = 'transparent';
    if (i < stage) {
      left = right = fillVar(i);
    } else if (i === stage) {
      left = fillVar(i);
      right = subStatus === 'done' ? fillVar(i) : paleVar(i);
    }
    return `<div class="seg"><span style="background:${left};"></span><span style="background:${right};"></span></div>`;
  });
  const arrow = '<span class="arrow"><i class="ti ti-arrow-right"></i></span>';
  return parts.join(arrow);
}

function mainViewHTML(item) {
  return `
    <div class="track-wrap">${trackHTML(item.stage, item.sub_status)}</div>
    <span class="badge ${badgeClass(item.stage)}">${badgeText(item.stage, item.sub_status)}</span>
    <button class="edit-btn" data-id="${item.id}" data-field="main" aria-label="编辑进度"><i class="ti ti-edit"></i></button>
  `;
}

function mainEditHTML(item) {
  return `
    <div class="edit-form">
      <select class="stage-select" data-id="${item.id}">
        <option value="1" ${item.stage === 1 ? 'selected' : ''}>沟通预算</option>
        <option value="2" ${item.stage === 2 ? 'selected' : ''}>建设目录</option>
        <option value="3" ${item.stage === 3 ? 'selected' : ''}>初设目录</option>
      </select>
      <select class="status-select" data-id="${item.id}">
        <option value="ing" ${item.sub_status === 'ing' ? 'selected' : ''}>进行中</option>
        <option value="done" ${item.sub_status === 'done' ? 'selected' : ''}>已完成</option>
      </select>
      <button class="save-btn" data-id="${item.id}" data-field="main">保存</button>
      <button class="cancel-btn" data-id="${item.id}" data-field="main">取消</button>
    </div>
  `;
}

function achvViewHTML(item) {
  const status = item.achievement_status;
  const cls = status ? 'badge-blue' : 'badge-gray';
  const label = status === 'done' ? '已完成' : status === 'ing' ? '进行中' : '未开始';
  return `
    <div class="track-wrap"></div>
    <span class="badge ${cls}">${label}</span>
    <button class="edit-btn" data-id="${item.id}" data-field="achv" aria-label="编辑建设成果梳理进度"><i class="ti ti-edit"></i></button>
  `;
}

function achvEditHTML(item) {
  const status = item.achievement_status ?? '';
  return `
    <div class="edit-form">
      <select class="achv-select" data-id="${item.id}">
        <option value="" ${status === '' ? 'selected' : ''}>未开始</option>
        <option value="ing" ${status === 'ing' ? 'selected' : ''}>进行中</option>
        <option value="done" ${status === 'done' ? 'selected' : ''}>已完成</option>
      </select>
      <button class="save-btn" data-id="${item.id}" data-field="achv">保存</button>
      <button class="cancel-btn" data-id="${item.id}" data-field="achv">取消</button>
    </div>
  `;
}

function branchRowHTML(item) {
  const body = editingKey === `${item.id}|achv` ? achvEditHTML(item) : achvViewHTML(item);
  return `<div class="row branch-row">
    <span class="group-name"><i class="ti ti-corner-down-right"></i>建设成果梳理</span>
    ${body}
  </div>`;
}

function multiRowHTML(item) {
  const body = editingKey === `${item.id}|main` ? mainEditHTML(item) : mainViewHTML(item);
  const nameLabel = item.group_name ? `${item.group_name}（${item.lead}）` : item.lead;
  let html = `<div class="row">
    <span class="group-name">${escapeHtml(nameLabel)}</span>
    ${body}
  </div>`;
  if (item.stage === 3) html += branchRowHTML(item);
  return html;
}

function multiCardHTML(subject, items) {
  const rows = items.map(multiRowHTML).join('');
  return `<div class="card">
    <div class="card-head"><i class="ti ${SUBJECT_ICON[subject]}"></i><span class="name">${subject}</span><span class="count">${items.length} 个课题组</span></div>
    ${rows}
  </div>`;
}

function singleCardHTML(subject, item) {
  const body = editingKey === `${item.id}|main` ? mainEditHTML(item) : mainViewHTML(item);
  const branch = item.stage === 3 ? branchRowHTML(item) : '';
  return `<div class="card single-card">
    <div class="card-head"><i class="ti ${SUBJECT_ICON[subject]}"></i><span class="name">${subject}</span></div>
    <p class="lead">${escapeHtml(item.lead)}</p>
    <div class="single-body">${body}</div>
    ${branch}
  </div>`;
}

function render() {
  const bySubject = {};
  groups.forEach(g => { (bySubject[g.subject] = bySubject[g.subject] || []).push(g); });
  Object.values(bySubject).forEach(list => list.sort((a, b) => a.sort_order - b.sort_order));

  const total = groups.length;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-stage1').textContent = groups.filter(g => g.stage === 1).length;
  document.getElementById('kpi-stage2').textContent = groups.filter(g => g.stage === 2).length;
  document.getElementById('kpi-stage3').textContent = groups.filter(g => g.stage === 3).length;

  let html = '';
  MULTI_SUBJECTS.forEach(s => {
    if (bySubject[s] && bySubject[s].length) html += multiCardHTML(s, bySubject[s]);
  });
  html += '<div class="single-grid">';
  SINGLE_SUBJECTS.forEach(s => {
    if (bySubject[s] && bySubject[s][0]) html += singleCardHTML(s, bySubject[s][0]);
  });
  html += '</div>';

  document.getElementById('cards-container').innerHTML = html || '<p class="empty-msg">暂无数据</p>';
  attachHandlers();
  updateKpiActiveStates();
  renderKpiDetail();

  const maxUpdated = groups.reduce((m, g) => (g.updated_at > m ? g.updated_at : m), '');
  if (maxUpdated) {
    const d = new Date(maxUpdated);
    document.getElementById('sync-time').textContent = '实时同步 · 最近更新 ' + d.toLocaleString('zh-CN', { hour12: false });
  } else {
    document.getElementById('sync-time').textContent = '实时同步';
  }
}

function updateKpiActiveStates() {
  document.querySelectorAll('.kpi-card').forEach(card => {
    const stage = card.dataset.stage === 'all' ? 'all' : parseInt(card.dataset.stage, 10);
    card.classList.toggle('active', selectedStage !== null && stage === selectedStage);
  });
}

function renderKpiDetail() {
  const panel = document.getElementById('kpi-detail');
  if (selectedStage === null) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  const list = selectedStage === 'all' ? groups.slice() : groups.filter(g => g.stage === selectedStage);
  list.sort((a, b) => a.subject.localeCompare(b.subject, 'zh') || a.sort_order - b.sort_order);
  const title = selectedStage === 'all' ? '全部课题组' : STAGE_LABEL[selectedStage] + ' 阶段的课题组';
  const chips = list.map(g => {
    const name = g.group_name ? `${g.subject}·${g.group_name}（${g.lead}）` : `${g.subject}（${g.lead}）`;
    return `<span class="kpi-detail-chip">${escapeHtml(name)}</span>`;
  }).join('') || '<span class="kpi-detail-chip">暂无</span>';
  panel.innerHTML = `<p class="kpi-detail-title">${title} · 共 ${list.length} 个</p><div class="kpi-detail-list">${chips}</div>`;
  panel.style.display = 'block';
}

function initKpiCards() {
  document.querySelectorAll('.kpi-card').forEach(card => {
    card.addEventListener('click', () => {
      const stage = card.dataset.stage === 'all' ? 'all' : parseInt(card.dataset.stage, 10);
      selectedStage = selectedStage === stage ? null : stage;
      updateKpiActiveStates();
      renderKpiDetail();
    });
  });
}

function attachHandlers() {
  document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      editingKey = `${btn.dataset.id}|${btn.dataset.field}`;
      render();
    });
  });
  document.querySelectorAll('.cancel-btn').forEach(btn => {
    btn.addEventListener('click', () => { editingKey = null; render(); });
  });
  document.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const field = btn.dataset.field;
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '保存中';

      if (field === 'main') {
        const stageVal = parseInt(document.querySelector(`.stage-select[data-id="${id}"]`).value, 10);
        const statusVal = document.querySelector(`.status-select[data-id="${id}"]`).value;
        const { error } = await supabase.rpc('update_group_progress', {
          p_id: id, p_stage: stageVal, p_sub_status: statusVal
        });
        if (error) {
          alert('保存失败：' + error.message);
          btn.disabled = false;
          btn.textContent = originalText;
          return;
        }
        const idx = groups.findIndex(g => g.id === id);
        if (idx >= 0) {
          groups[idx] = { ...groups[idx], stage: stageVal, sub_status: statusVal, updated_at: new Date().toISOString() };
        }
      } else {
        const raw = document.querySelector(`.achv-select[data-id="${id}"]`).value;
        const statusVal = raw === '' ? null : raw;
        const { error } = await supabase.rpc('update_achievement_review', {
          p_id: id, p_status: statusVal
        });
        if (error) {
          alert('保存失败：' + error.message);
          btn.disabled = false;
          btn.textContent = originalText;
          return;
        }
        const idx = groups.findIndex(g => g.id === id);
        if (idx >= 0) {
          groups[idx] = { ...groups[idx], achievement_status: statusVal, updated_at: new Date().toISOString() };
        }
      }

      editingKey = null;
      render();
    });
  });
}

async function loadData() {
  const { data, error } = await supabase.from('groups').select('*');
  if (error) {
    document.getElementById('cards-container').innerHTML = '<p class="empty-msg">数据加载失败，请刷新重试。</p>';
    return;
  }
  groups = data;
  render();
}

// KPI cards have no server dependency, so bind them immediately rather than
// waiting on the Supabase module fetch below — otherwise clicks during that
// network round-trip would silently do nothing.
initKpiCards();

async function boot() {
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  supabase
    .channel('groups-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'groups' }, payload => {
      const incoming = payload.new && Object.keys(payload.new).length ? payload.new : payload.old;
      const idx = groups.findIndex(g => g.id === incoming.id);
      if (payload.eventType === 'DELETE') {
        if (idx >= 0) groups.splice(idx, 1);
      } else if (idx >= 0) {
        groups[idx] = payload.new;
      } else {
        groups.push(payload.new);
      }
      const editingRowId = editingKey ? editingKey.split('|')[0] : null;
      if (editingRowId !== incoming.id) render();
    })
    .subscribe();

  await loadData();
}

boot().catch(() => {
  document.getElementById('cards-container').innerHTML = '<p class="empty-msg">数据加载失败，请刷新重试。</p>';
});
</script>
</body>
